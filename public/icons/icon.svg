  <g fill="#141414" stroke="url(#gold)" stroke-width="10">
    <circle cx="128" cy="352" r="42"/>
    <circle cx="236" cy="352" r="42"/>
    <circle cx="396" cy="352" r="42"/>
  </g>
  <g fill="url(#gold)">
    <circle cx="128" cy="352" r="14"/>
    <circle cx="236" cy="352" r="14"/>
    <circle cx="396" cy="352" r="14"/>
