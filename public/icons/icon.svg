<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6e27a"/>
      <stop offset="0.45" stop-color="#d4af37"/>
      <stop offset="0.75" stop-color="#b8860b"/>
      <stop offset="1" stop-color="#f1d67a"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d2e5c"/>
      <stop offset="1" stop-color="#3a539b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#sky)"/>
  <!-- US flag stripes lower half -->
  <g>
    <rect y="300" width="512" height="36" fill="#b31942"/>
    <rect y="336" width="512" height="36" fill="#ffffff"/>
    <rect y="372" width="512" height="36" fill="#b31942"/>
    <rect y="408" width="512" height="36" fill="#ffffff"/>
    <rect y="444" width="512" height="68" fill="#b31942"/>
  </g>
  <!-- stars -->
  <g fill="#ffffff" opacity="0.95">
    <circle cx="70" cy="70" r="9"/><circle cx="140" cy="96" r="9"/><circle cx="60" cy="150" r="9"/>
    <circle cx="210" cy="60" r="9"/><circle cx="440" cy="70" r="9"/><circle cx="380" cy="110" r="9"/>
    <circle cx="450" cy="150" r="9"/><circle cx="300" cy="80" r="9"/><circle cx="130" cy="180" r="9"/>
  </g>
  <!-- golden semi truck -->
  <g stroke="#8a6508" stroke-width="6" stroke-linejoin="round">
    <rect x="52" y="188" width="256" height="140" rx="14" fill="url(#gold)"/>
    <path d="M308 214 h84 l52 60 v54 h-136 z" fill="url(#gold)"/>
    <rect x="332" y="228" width="52" height="44" rx="8" fill="#1d2e5c" stroke="#8a6508"/>
